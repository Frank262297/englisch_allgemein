<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Englisch-Quiz im Kahoot-Stil</title>
  <style>
    :root {
      --bg1: #4f46e5;
      --bg2: #9333ea;
      --card: rgba(255, 255, 255, 0.95);
      --text: #111827;
      --muted: #6b7280;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --purple: #a855f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      background: var(--card);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .badge {
      background: #111827;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    h1, h2 {
      margin: 0 0 12px;
      line-height: 1.15;
    }

    h1 { font-size: clamp(2rem, 5vw, 4rem); }
    h2 { font-size: clamp(1.5rem, 3vw, 2.6rem); }

    p { color: var(--muted); font-size: 1.08rem; }

    .screen { display: none; }
    .screen.active { display: block; }

    .center { text-align: center; }

    button {
      border: none;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 800;
      border-radius: 18px;
      padding: 16px 20px;
      transition: transform .08s ease, filter .15s ease, opacity .15s ease;
    }

    button:hover { filter: brightness(1.04); transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    .start-btn, .next-btn, .restart-btn {
      background: #111827;
      color: white;
      min-width: 220px;
      margin-top: 18px;
    }

    .progress-wrap {
      background: #e5e7eb;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      margin: 18px 0 22px;
    }

    .progress {
      background: linear-gradient(90deg, #22c55e, #84cc16);
      height: 100%;
      width: 0%;
      transition: width .3s ease;
    }

    .question-card {
      background: white;
      border-radius: 24px;
      padding: 26px;
      box-shadow: inset 0 0 0 2px #eef2ff;
      margin-bottom: 18px;
    }

    .question {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 900;
      text-align: center;
      margin: 10px 0;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .answer {
      color: white;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      line-height: 1.25;
      box-shadow: 0 12px 24px rgba(0,0,0,.14);
    }

    .answer:nth-child(1) { background: var(--red); }
    .answer:nth-child(2) { background: var(--blue); }
    .answer:nth-child(3) { background: var(--yellow); }
    .answer:nth-child(4) { background: var(--green); }

    .answer.correct { outline: 6px solid #16a34a; filter: brightness(1.08); }
    .answer.wrong { outline: 6px solid #991b1b; filter: grayscale(.2) brightness(.82); }

    .symbol { font-size: 1.6rem; }

    .feedback {
      min-height: 34px;
      font-size: 1.25rem;
      font-weight: 900;
      text-align: center;
      margin: 14px 0 0;
    }

    .feedback.good { color: #16a34a; }
    .feedback.bad { color: #dc2626; }

    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    .stat {
      background: #f3f4f6;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 800;
    }

    .small { font-size: .95rem; color: var(--muted); }

    @media (max-width: 700px) {
      body { padding: 12px; }
      .app { padding: 18px; border-radius: 20px; }
      .answers { grid-template-columns: 1fr; }
      .answer { min-height: 78px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="startScreen" class="screen active center">
      <div class="badge">Englisch • 25 Fragen</div>
      <h1>Kahoot-Style Quiz</h1>
      <p>Wähle die richtige Antwort. Pro richtiger Antwort bekommst du einen Punkt.</p>
      <button class="start-btn" onclick="startQuiz()">Quiz starten</button>
      <p class="small">Themen: Grammatik, Wortschatz, Zeiten, Präpositionen und typische Fehler.</p>
    </section>

    <section id="quizScreen" class="screen">
      <div class="topbar">
        <div class="badge" id="questionCounter">Frage 1/25</div>
        <div class="badge" id="scoreDisplay">Punkte: 0</div>
      </div>
      <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>
      <div class="question-card">
        <div class="question" id="questionText"></div>
      </div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <div class="center">
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Weiter</button>
      </div>
    </section>

    <section id="resultScreen" class="screen center">
      <div class="badge">Ergebnis</div>
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
      <div class="stats">
        <div class="stat" id="finalScore"></div>
        <div class="stat" id="finalPercent"></div>
      </div>
      <button class="restart-btn" onclick="restartQuiz()">Nochmal spielen</button>
    </section>
  </main>

  <script>
    const quiz = [
      { q: "Choose the correct sentence.", a: ["She don't like tea.", "She doesn't like tea.", "She doesn't likes tea.", "She not like tea."], c: 1 },
      { q: "What is the past tense of 'go'?", a: ["goed", "gone", "went", "goes"], c: 2 },
      { q: "Complete: I have lived here ___ 2020.", a: ["for", "since", "during", "ago"], c: 1 },
      { q: "Which word is a synonym for 'happy'?", a: ["sad", "angry", "tired", "glad"], c: 3 },
      { q: "Complete: There ___ many students in the room.", a: ["is", "are", "am", "be"], c: 1 },
      { q: "Choose the correct question.", a: ["Where you live?", "Where do you live?", "Where does you live?", "Where are you live?"], c: 1 },
      { q: "What is the plural of 'child'?", a: ["childs", "childes", "children", "childrens"], c: 2 },
      { q: "Complete: This is ___ interesting book.", a: ["a", "an", "the", "—"], c: 1 },
      { q: "Which sentence uses the present perfect?", a: ["I saw that film yesterday.", "I see that film.", "I have seen that film.", "I will see that film."], c: 2 },
      { q: "Complete: He is good ___ playing football.", a: ["in", "on", "at", "for"], c: 2 },
      { q: "What is the opposite of 'expensive'?", a: ["cheap", "rich", "costly", "valuable"], c: 0 },
      { q: "Choose the correct comparative form.", a: ["more fast", "faster", "fastest", "most fast"], c: 1 },
      { q: "Complete: If it rains, we ___ stay at home.", a: ["will", "would", "did", "have"], c: 0 },
      { q: "Which word is an adverb?", a: ["quick", "quickly", "quicker", "quickness"], c: 1 },
      { q: "Complete: I usually ___ breakfast at 7 o'clock.", a: ["have", "has", "am having", "having"], c: 0 },
      { q: "Which sentence is correct?", a: ["I am agree with you.", "I agree with you.", "I do agree with you are.", "I agreeing with you."], c: 1 },
      { q: "Complete: We went to London ___ train.", a: ["with", "on", "by", "at"], c: 2 },
      { q: "What does 'to borrow' mean?", a: ["etwas verleihen", "etwas kaufen", "sich etwas ausleihen", "etwas verlieren"], c: 2 },
      { q: "Choose the correct future form.", a: ["I going to visit Paris.", "I am going visit Paris.", "I am going to visit Paris.", "I will going to visit Paris."], c: 2 },
      { q: "Complete: My sister is older ___ me.", a: ["as", "than", "then", "like"], c: 1 },
      { q: "Which is an uncountable noun?", a: ["apple", "chair", "information", "car"], c: 2 },
      { q: "Complete: You ___ smoke in a hospital.", a: ["mustn't", "don't have", "haven't", "couldn't to"], c: 0 },
      { q: "What is the correct translation of 'Ich freue mich darauf'?", a: ["I look after it.", "I look forward to it.", "I look for it.", "I look at it."], c: 1 },
      { q: "Choose the correct passive sentence.", a: ["The cake baked my mother.", "The cake was baked by my mother.", "The cake was bake by my mother.", "The cake is baking by my mother."], c: 1 },
      { q: "Complete: Neither Tom ___ Lisa was late.", a: ["or", "nor", "and", "but"], c: 1 }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const symbols = ["▲", "◆", "●", "■"];

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startQuiz() {
      current = 0;
      score = 0;
      answered = false;
      showScreen('quizScreen');
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const item = quiz[current];
      document.getElementById('questionCounter').textContent = `Frage ${current + 1}/${quiz.length}`;
      document.getElementById('scoreDisplay').textContent = `Punkte: ${score}`;
      document.getElementById('progressBar').style.width = `${(current / quiz.length) * 100}%`;
      document.getElementById('questionText').textContent = item.q;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtn').style.display = 'none';

      const answers = document.getElementById('answers');
      answers.innerHTML = '';

      item.a.forEach((answer, index) => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.innerHTML = `<span class="symbol">${symbols[index]}</span><span>${answer}</span>`;
        btn.onclick = () => chooseAnswer(index, btn);
        answers.appendChild(btn);
      });
    }

    function chooseAnswer(index) {
      if (answered) return;
      answered = true;
      const item = quiz[current];
      const buttons = document.querySelectorAll('.answer');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === item.c) btn.classList.add('correct');
        if (i === index && i !== item.c) btn.classList.add('wrong');
      });

      const feedback = document.getElementById('feedback');
      if (index === item.c) {
        score++;
        feedback.textContent = 'Richtig! 🎉';
        feedback.classList.add('good');
      } else {
        feedback.textContent = `Leider falsch. Richtig ist: ${item.a[item.c]}`;
        feedback.classList.add('bad');
      }
      document.getElementById('scoreDisplay').textContent = `Punkte: ${score}`;
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextQuestion() {
      current++;
      if (current < quiz.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      const percent = Math.round((score / quiz.length) * 100);
      document.getElementById('progressBar').style.width = '100%';
      showScreen('resultScreen');
      document.getElementById('finalScore').textContent = `${score} von ${quiz.length} Punkten`;
      document.getElementById('finalPercent').textContent = `${percent}% richtig`;

      let title = '';
      let text = '';
      if (percent >= 90) {
        title = 'Excellent! 🏆';
        text = 'Sehr stark! Du beherrschst die meisten Aufgaben sicher.';
      } else if (percent >= 70) {
        title = 'Well done! ⭐';
        text = 'Gutes Ergebnis. Ein paar Details kannst du noch üben.';
      } else if (percent >= 50) {
        title = 'Not bad! 💪';
        text = 'Solide Basis. Wiederholung hilft dir, sicherer zu werden.';
      } else {
        title = 'Keep practising! 📚';
        text = 'Mach das Quiz nochmal und achte besonders auf Grammatik und Präpositionen.';
      }
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultText').textContent = text;
    }

    function restartQuiz() {
      startQuiz();
    }
  </script>
</body>
</html>
